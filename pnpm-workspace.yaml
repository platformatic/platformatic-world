packages:
  - 'packages/*'
  - 'e2e-v5'
  - 'e2e-v4'

# pnpm 11 replaces the old `pnpm.onlyBuiltDependencies` array in
# package.json with this dict-shaped allowlist here. Listed packages must
# run install scripts (native builds); others are skipped silently.
allowBuilds:
  '@swc/core': true
  cbor-extract: true
  esbuild: true
  protobufjs: true
  sharp: true

minimumReleaseAge: 1440
# Skip the 24h release-age gate for the Vercel Workflow SDK — we actively
# track unreleased betas and the 24h delay would slow us by a full release
# cycle on every bump.
minimumReleaseAgeExclude:
  - workflow
  - '@workflow/*'
