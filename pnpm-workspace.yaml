packages:
  - 'packages/*'
  - 'e2e-v5'
  - 'e2e-v4'

# pnpm 11 replaces the old `pnpm.onlyBuiltDependencies` array in
# package.json with this dict-shaped allowlist here. Listed packages must
# run install scripts (native builds); others are skipped silently.
allowBuilds:
  '@swc/core': true
  cbor-extract: true
  esbuild: true
  protobufjs: true
  sharp: true

# pnpm 11 prompts before purging an existing modules directory in non-TTY
# environments and aborts the install if it can't read a yes/no answer.
# CI runners set CI=true so they bypass this, but K8s pods and other
# headless contexts don't — disable the prompt globally so the image is
# self-contained.
confirmModulesPurge: false

minimumReleaseAge: 1440
